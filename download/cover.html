<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPSE Vedic Astrology Trading Platform</title>
<style>
  @page {
    size: 794px 1123px;
    margin: 0;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    width: 794px;
    height: 1123px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Layer 1: Background grid */
  .layer-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 794px;
    height: 1123px;
    overflow: hidden;
    z-index: 0;
  }
  .layer-bg svg {
    width: 100%;
    height: 100%;
  }

  /* Layer 2: Structure lines */
  .layer-structure {
    position: absolute;
    top: 0;
    left: 0;
    width: 794px;
    height: 1123px;
    z-index: 1;
    pointer-events: none;
  }
  .layer-structure svg {
    width: 100%;
    height: 100%;
  }

  /* Layer 3: Content */
  .layer-content {
    position: absolute;
    top: 0;
    left: 0;
    width: 794px;
    height: 1123px;
    z-index: 2;
    box-sizing: border-box;
    padding-left: 125.28pt; /* 0.12*794 + 30pt ≈ 95.28 + 30 = 125.28pt */
  }

  .kicker {
    position: absolute;
    top: 168.45pt; /* 0.15 * 1123 */
    left: 0;
    font-size: 16pt;
    font-weight: 400;
    letter-spacing: 3pt;
    text-transform: uppercase;
    color: #1d1e20;
    opacity: 0.6;
  }

  .hero-title {
    position: absolute;
    top: 336.9pt; /* 0.30 * 1123 */
    left: 0;
    font-size: 48pt;
    font-weight: 900;
    line-height: 1.15;
    color: #1d1e20;
    max-width: 600pt;
  }

  .summary {
    position: absolute;
    top: 561.5pt; /* 0.50 * 1123 */
    left: 0;
    font-size: 16pt;
    font-weight: 400;
    line-height: 1.6;
    color: #1d1e20;
    opacity: 0.85;
    width: 476.4pt; /* 794 * 0.6 */
  }

  .meta {
    position: absolute;
    top: 842.25pt; /* 0.75 * 1123 */
    left: 0;
    font-size: 16pt;
    font-weight: 400;
    color: #1d1e20;
  }

  .meta .muted {
    color: #7b8288;
  }

  .footer {
    position: absolute;
    top: 1033.16pt; /* 0.92 * 1123 */
    left: 0;
    font-size: 12pt;
    font-weight: 400;
    letter-spacing: 2pt;
    text-transform: uppercase;
    color: #1d1e20;
    opacity: 0.6;
  }
</style>
